name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: portal
          POSTGRES_PASSWORD: portal
          POSTGRES_DB: reports_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U portal -d reports_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Enables the Postgres integration test (TestPostgresQueries); without this the
      # test skips. Verifies the real PG path: schema DDL, STRING_AGG, ILIKE search.
      TEST_POSTGRES_DSN: "postgres://portal:portal@localhost:5432/reports_test?sslmode=disable"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./... -v
