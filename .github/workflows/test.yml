name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: portal
          POSTGRES_PASSWORD: portal
          POSTGRES_DB: reports_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U portal -d reports_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Enables the Postgres integration test (TestPostgresQueries); without this the
      # test skips. Verifies the real PG path: schema DDL, STRING_AGG, ILIKE search.
      TEST_POSTGRES_DSN: "postgres://portal:portal@localhost:5432/reports_test?sslmode=disable"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build ./... # compile every package (fails fast on a build break)
      - run: go vet ./...
      - run: go test ./... -v

  web-build:
    name: web typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install deps
        working-directory: web
        run: npm ci
      - name: Typecheck # tsc --noEmit: catches type errors the build would tolerate
        working-directory: web
        run: npm run typecheck
      - name: Unit tests
        working-directory: web
        run: npm run test
      - name: Build SPA # vite build → ../internal/web/dist; fails on any compile error
        working-directory: web
        run: npm run build
