# 复制为 config.yaml 后按需修改。config.yaml 不进 git。
# 程序首次运行时若没有 config.yaml，会【自动生成】一份（含随机 secret_key），一般无需手动建。
#
# config 只放【基础设施】：监听端口 / 会话密钥 / 数据库连接。
# 其余全部在网页里管、存数据库：
#   旧门户凭据、同步间隔 → 「系统设置」
#   账号（角色）        → 「账号管理」（首次启动自动创建 admin，密码打印在终端）
#   入口按钮、报告类型   → 对应管理页

listen: ":8790"

# 会话签名密钥（部署密钥，非应用设置）：openssl rand -hex 32
# 自动生成的配置里已随机填好，通常无需改动。
secret_key: "换成长随机串"

# 数据库：sqlite(默认，单文件零依赖) 或 postgres
db_driver: "sqlite"
db_path: "data/portal.db"
# db_driver: "postgres"
# db_dsn: "postgres://user:pass@127.0.0.1:5432/reports?sslmode=disable"
