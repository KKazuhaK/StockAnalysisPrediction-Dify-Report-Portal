{{define "content"}}
<div class="report-head"><a href="/" class="btn-ghost">{{icon "arrow-left"}} 返回列表</a></div>
<h2 class="page-h">生成研报入口 · 按钮管理</h2>
<p class="hint-line">拖拽左侧手柄可调整按钮顺序，松手即保存。</p>

<div class="link-row link-head"><span></span><span>名称</span><span>链接 URL</span><span></span></div>
<div class="link-table" id="link-sort">
  {{range .Links}}
  <form class="link-row drag" method="post" action="/manage/links/{{.ID}}/edit" data-id="{{.ID}}">
    <span class="drag-handle" title="拖拽排序">{{icon "grip-vertical"}}</span>
    <input name="label" value="{{.Label}}" required>
    <input name="url" value="{{.URL}}" required>
    <span class="link-acts">
      <button type="submit" class="btn-ghost">保存</button>
      <button type="submit" class="btn-ghost danger" formaction="/manage/links/{{.ID}}/delete">{{icon "trash"}} 删除</button>
    </span>
  </form>
  {{end}}
</div>

<h3 class="page-h">添加新按钮</h3>
<form class="link-row add" method="post" action="/manage/links/add">
  <input name="label" placeholder="按钮名称，如 技术分析" required>
  <input name="url" placeholder="https://… 或 http://dify…/workflow/xxx" required>
  <button type="submit">添加</button>
</form>

<script src="/static/vendor/Sortable.min.js"></script>
<script>
(function(){
  var el = document.getElementById('link-sort');
  if (el && window.Sortable) new Sortable(el, {
    handle: '.drag-handle', draggable: 'form.link-row', animation: 150,
    onEnd: function(){
      var body = Array.prototype.map.call(el.querySelectorAll('form.link-row'), function(r){
        return 'id=' + encodeURIComponent(r.dataset.id);
      }).join('&');
      fetch('/manage/links/reorder', {method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body: body});
    }
  });
})();
</script>
{{end}}
